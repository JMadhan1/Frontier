<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="cyber" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00d4ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#00b8e6;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Background circle -->
  <circle cx="50" cy="50" r="45" fill="#0a1628" stroke="url(#cyber)" stroke-width="2"/>
  
  <!-- Rocket body -->
  <g filter="url(#glow)">
    <path d="M50 20 L60 50 L55 55 L55 70 L50 75 L45 70 L45 55 L40 50 Z" fill="url(#cyber)"/>
    
    <!-- Rocket window -->
    <circle cx="50" cy="40" r="6" fill="#0a1628"/>
    <circle cx="50" cy="40" r="4" fill="#00d4ff" opacity="0.5"/>
    
    <!-- Rocket fins -->
    <path d="M40 50 L35 60 L42 55 Z" fill="url(#cyber)"/>
    <path d="M60 50 L65 60 L58 55 Z" fill="url(#cyber)"/>
    
    <!-- Flame -->
    <path d="M45 70 L50 85 L55 70 Q50 75 45 70" fill="#ff9f43"/>
    <path d="M47 72 L50 82 L53 72 Q50 76 47 72" fill="#ff4757"/>
  </g>
  
  <!-- Orbit rings -->
  <ellipse cx="50" cy="50" rx="35" ry="10" fill="none" stroke="url(#cyber)" stroke-width="1" opacity="0.3" transform="rotate(-20 50 50)"/>
  <ellipse cx="50" cy="50" rx="35" ry="10" fill="none" stroke="url(#cyber)" stroke-width="1" opacity="0.3" transform="rotate(20 50 50)"/>
</svg>